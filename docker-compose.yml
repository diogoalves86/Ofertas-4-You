services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${PORTA_APP:-3002}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    volumes:
      - midias:/app/media
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/saude'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ofertas4you}
      POSTGRES_USER: ${POSTGRES_USER:-ofertas4you}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ofertas4you}
    volumes:
      - postgres-dados:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10

  cron-runner:
    build:
      context: .
      dockerfile: rotinas/Dockerfile
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      URL_INTERNA_APP: http://app:3000

volumes:
  postgres-dados:
  midias:
